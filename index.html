<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Abo's Archive | Digital Filing System</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 保持之前的 Clean Fit 样式 */
        body {
            background-color: #FAF8F2;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: #1a1a1a;
            font-family: Georgia, "Times New Roman", serif; 
            line-height: 1.75;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .page-wrapper {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 60px;
            border-left: 3px solid #1a1a1a;
            border-right: 1px solid #eee;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.02);
        }

        header { border-bottom: 2px solid #1a1a1a; margin-bottom: 50px; padding-bottom: 30px; }
        .site-title { font-size: 3rem; font-weight: bold; text-transform: uppercase; font-family: "Times New Roman", Times, serif; }

        /* 重点：文章列表样式 */
        #post-list { list-style: none; padding: 0; }
        .post-entry { margin-bottom: 40px; cursor: pointer; }
        .post-entry:hover h2 { text-decoration: underline; }
        
        .post-meta {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.75rem;
            background: #f0f0f0;
            padding: 2px 8px;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* 隐藏文章内容，点击后再显示 */
        #content-viewer { display: none; }
        .back-btn { cursor: pointer; font-family: "Courier New", monospace; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div class="page-wrapper" id="main-container">
        <div id="index-view">
            <header>
                <div class="site-title">ABO'S ARCHIVE</div>
            </header>
            
            <main>
                <ul id="post-list">
                    <p style="font-family: monospace;">正在检索档案库...</p>
                </ul>
            </main>
        </div>

        <div id="content-view" style="display: none;">
            <div class="back-btn" onclick="showIndex()">[ ← BACK TO INDEX ]</div>
            <article id="article-body"></article>
        </div>
    </div>

    <script>
        // 你只需要在这里列出你的文件名，以后每写一篇，就在这里加个名字
        const posts = ['first-post.md']; 

        async function loadPosts() {
            const listElement = document.getElementById('post-list');
            listElement.innerHTML = '';

            for (const file of posts) {
                const response = await fetch(`posts/${file}`);
                const text = await response.text();
                
                // 简单的标题提取逻辑
                const title = text.split('\n')[1].replace('title: ', '') || file;
                const date = text.split('\n')[2].replace('date: ', '') || 'UNKNOWN';

                const li = document.createElement('li');
                li.className = 'post-entry';
                li.innerHTML = `
                    <div class="post-meta">FILED ON: ${date}</div>
                    <h2>${title}</h2>
                `;
                li.onclick = () => showPost(text);
                listElement.appendChild(li);
            }
        }

        function showPost(markdown) {
            // 过滤掉最上面的元数据，只显示正文
            const content = markdown.split('---').slice(2).join('---');
            document.getElementById('index-view').style.display = 'none';
            document.getElementById('content-view').style.display = 'block';
            document.getElementById('article-body').innerHTML = marked.parse(content);
        }

        function showIndex() {
            document.getElementById('index-view').style.display = 'block';
            document.getElementById('content-view').style.display = 'none';
        }

        loadPosts();
    </script>
</body>
</html>
