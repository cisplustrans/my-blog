<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abo's Archive | Digital Filing System</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 1. 基础视觉审美 (Clean Fit) --- */
        body {
            background-color: #FAF8F2;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: #1a1a1a;
            font-family: Georgia, "Times New Roman", serif; 
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .page-wrapper {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 60px;
            border-left: 3px solid #1a1a1a;
            border-right: 1px solid #eee;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.02);
            position: relative;
            min-height: 90vh;
        }

        header { border-bottom: 2px solid #1a1a1a; margin-bottom: 50px; padding-bottom: 30px; }
        .site-title { font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: -1px; margin: 0; font-family: "Times New Roman", Times, serif; cursor: pointer; }

        .nav-links { margin-top: 20px; font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 0.9rem; }
        .nav-links a { color: #1a1a1a; text-decoration: none; margin-right: 30px; cursor: pointer; padding: 2px 5px; display: inline-block; }
        .nav-links a:hover { background-color: #1a1a1a; color: white; }

        .layout-grid { display: grid; grid-template-columns: 1fr 260px; gap: 60px; }

        /* 文章列表卡片 */
        .post-card { margin-bottom: 50px; cursor: pointer; border-bottom: 1px solid #f2f2f2; padding-bottom: 30px; }
        .post-card h2 { font-size: 1.8rem; margin: 0 0 10px 0; line-height: 1.3; font-family: Georgia, serif; }
        .post-excerpt { font-size: 1.05rem; color: #444; text-align: justify; margin: 15px 0; opacity: 0.85; }

        .post-metadata {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 12px;
            display: flex; gap: 10px; font-weight: bold;
        }
        .meta-item { background: #f0f0f0; padding: 2px 6px; text-transform: uppercase; }

        /* 侧栏 Daily Log */
        .sidebar-log { font-family: "Courier New", Courier, monospace; border-left: 1px solid #ddd; padding-left: 30px; }
        .sidebar-log h3 { font-size: 1.1rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 20px; }
        .log-note { font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5; }
        .log-note strong { display: block; background: #1a1a1a; color: white; padding: 0 5px; width: fit-content; margin-bottom: 5px; }

        /* --- 2. 手机端适配 (Responsive Design) --- */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .page-wrapper { padding: 30px 20px; border-right: 3px solid #1a1a1a; }
            .site-title { font-size: 1.8rem; letter-spacing: 0; }
            .nav-links a { margin-right: 15px; margin-bottom: 10px; font-size: 0.8rem; }
            
            /* 关键：双栏变单栏 */
            .layout-grid { grid-template-columns: 1fr; gap: 40px; }
            .sidebar-log { border-left: none; padding-left: 0; border-top: 1px solid #ddd; padding-top: 30px; }
            
            #article-body { font-size: 1.1rem; }
        }

        /* --- 3. 文章内容与图片排版 --- */
        #content-view { display: none; }
        .back-btn { 
            cursor: pointer; font-family: "Courier New", monospace; font-weight: bold; 
            margin-bottom: 30px; display: inline-block; background: #1a1a1a; color: white; padding: 5px 15px;
        }

        #article-body { text-align: justify; text-justify: inter-character; }
        #article-body p { margin-bottom: 1.6em; }

        #article-body img {
            display: block;
            margin: 40px auto 15px auto;
            max-width: 100%;
            height: auto;
            border: 1px solid #1a1a1a;
            filter: contrast(1.05);
        }

        #article-body small {
            display: block;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 40px;
            color: #666;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.8rem;
        }
        
        footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid #eee; font-family: "Courier New", monospace; font-size: 0.7rem; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <div class="site-title" onclick="loadPosts()">ABO'S ARCHIVE</div>
            <nav class="nav-links">
                <a onclick="loadPosts('OBSERVATIONS')">/OBSERVATIONS</a>
                <a onclick="loadPosts('VIEWPOINTS')">/VIEWPOINTS</a>
                <a onclick="showAbout()">/ABOUT</a>
            </nav>
        </header>

        <div id="index-view">
            <div class="layout-grid">
                <section class="article-list" id="post-list"></section>

                <aside class="sidebar-log">
                    <h3>DAILY LOG</h3>
                    <div id="log-container">
                        <p style="font-size: 0.7rem;">LOADING ARCHIVE...</p>
                    </div>
                </aside>
            </div>
        </div>

        <div id="content-view">
            <div class="back-btn" onclick="showIndex()">[ ← BACK TO INDEX ]</div>
            <div id="post-header-info"></div>
            <article id="article-body"></article>
        </div>

        <footer>
            TYPESET BY ABO IN SHENZHEN. <br>
            2026 DIGITAL ARCHIVE PROJECT.
        </footer>
    </div>

    <script>
        const postFiles = ['post2.md', 'post1.md']; 

        async function loadPosts(filterField = null) {
            showIndex();
            const listElement = document.getElementById('post-list');
            listElement.innerHTML = '';

            for (const file of postFiles) {
                try {
                    const response = await fetch(`posts/${file}`);
                    const text = await response.text();
                    const title = extractMeta(text, 'title') || file;
                    const date = extractMeta(text, 'date') || '2026';
                    const loc = extractMeta(text, 'location') || 'SZ';
                    const field = extractMeta(text, 'field') || 'GENERAL';
                    const description = extractMeta(text, 'description') || '';

                    if (filterField && field.toUpperCase() !== filterField.toUpperCase()) continue;

                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-metadata"><span class="meta-item">${field}</span><span class="meta-item">${loc}</span></div>
                        <h2>${title}</h2>
                        <p class="post-excerpt">${description}</p>
                        <div class="post-metadata" style="background:none; color:#999;">DATE: ${date}</div>
                    `;
                    card.onclick = () => showPost(text, title, date, loc, field);
                    listElement.appendChild(card);
                } catch (e) { console.error(e); }
            }
        }

        async function loadDailyLogs() {
            const logContainer = document.getElementById('log-container');
            try {
                const response = await fetch('daily-log.md');
                const text = await response.text();
                let entries = text.split('###').map(e => e.trim()).filter(e => e !== '');
                logContainer.innerHTML = '';
                entries.slice(0, 4).forEach(entry => {
                    const lines = entry.split('\n');
                    const date = lines[0].trim();
                    const content = lines.slice(1).join('<br>').trim();
                    const div = document.createElement('div');
                    div.className = 'log-note';
                    div.innerHTML = `<strong>${date}</strong>${content}`;
                    logContainer.appendChild(div);
                });
            } catch (e) {
                logContainer.innerHTML = '<p>EMPTY ARCHIVE</p>';
            }
        }

        function extractMeta(text, key) {
            const regex = new RegExp(`${key}:\\s*(.*)`);
            const match = text.match(regex);
            return match ? match[1].trim() : null;
        }

        function showPost(markdown, title, date, loc, field) {
            const content = markdown.split('---').slice(2).join('---');
            document.getElementById('index-view').style.display = 'none';
            document.getElementById('content-view').style.display = 'block';
            document.getElementById('post-header-info').innerHTML = `
                <div class="post-metadata"><span class="meta-item">${field}</span><span class="meta-item">${loc}</span><span class="meta-item">${date}</span></div>
                <h1 style="font-family: Georgia, serif; border-bottom: 2px solid #333; padding-bottom:10px;">${title}</h1>
            `;
            document.getElementById('article-body').innerHTML = marked.parse(content);
            window.scrollTo(0, 0);
        }

        function showIndex() {
            document.getElementById('index-view').style.display = 'block';
            document.getElementById('content-view').style.display = 'none';
            window.scrollTo(0, 0);
        }

        function showAbout() {
       showPost('---\n---\n# ABO\n\n一点自己的想法。\n\n目前在广州/深圳。音乐/社会/宏观经济', 'ABOUT ME', '2026', 'SHENZHEN', 'PROFILE');
        }

        loadPosts();
        loadDailyLogs();
    </script>
</body>
</html>
