<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Abo's Archive | Field Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 1. 恢复所有视觉审美 (V5版) --- */
        body {
            background-color: #FAF8F2;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: #1a1a1a;
            font-family: Georgia, "Times New Roman", serif; 
            line-height: 1.75;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .page-wrapper {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 60px;
            border-left: 3px solid #1a1a1a;
            border-right: 1px solid #eee;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.02);
            position: relative;
            min-height: 80vh;
        }

        header { border-bottom: 2px solid #1a1a1a; margin-bottom: 50px; padding-bottom: 30px; }
        .site-title { font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: -1px; margin: 0; font-family: "Times New Roman", Times, serif; }

        .nav-links { margin-top: 20px; font-family: "Courier New", Courier, monospace; font-weight: bold; font-size: 0.9rem; }
        .nav-links a { color: #1a1a1a; text-decoration: none; margin-right: 30px; }
        .nav-links a:hover { text-decoration: underline; }

        /* --- 2. 恢复布局结构 --- */
        .layout-grid { display: grid; grid-template-columns: 1fr 260px; gap: 60px; }

        /* 文章元数据标签 */
        .post-metadata {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            font-weight: bold;
        }
        .meta-item { background: #f0f0f0; padding: 2px 6px; text-transform: uppercase; }

        .post-card { margin-bottom: 50px; cursor: pointer; border-bottom: 1px solid #f9f9f9; padding-bottom: 20px; }
        .post-card:hover h2 { text-decoration: underline; }
        .post-card h2 { font-size: 1.8rem; margin: 0 0 10px 0; line-height: 1.3; }

        /* 侧栏 Daily Log */
        .sidebar-log { font-family: "Courier New", Courier, monospace; border-left: 1px solid #ddd; padding-left: 30px; }
        .sidebar-log h3 { font-size: 1.1rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 20px; }
        .log-note { font-size: 0.85rem; margin-bottom: 25px; }
        .log-note strong { display: block; background: #1a1a1a; color: white; padding: 0 5px; width: fit-content; margin-bottom: 5px; }

        /* --- 3. 文章阅读视图样式 --- */
        #content-view { display: none; }
        .back-btn { 
            cursor: pointer; font-family: "Courier New", monospace; 
            font-weight: bold; margin-bottom: 30px; display: inline-block; 
            background: #1a1a1a; color: white; padding: 5px 15px;
        }
        #article-body h1, #article-body h2 { font-family: "Times New Roman", serif; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #article-body img { max-width: 100%; height: auto; border: 1px solid #eee; }

        footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid #eee; font-family: "Courier New", monospace; font-size: 0.75rem; color: #888; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <div class="site-title">ABO'S ARCHIVE</div>
            <nav class="nav-links">
                <a href="javascript:location.reload()">/OBSERVATIONS</a>
                <a href="#">/VIEWPOINTS</a>
                <a href="#">/ABOUT</a>
            </nav>
        </header>

        <div id="index-view">
            <div class="layout-grid">
                <section class="article-list" id="post-list">
                    <p style="font-family: monospace;">正在从档案库调取文件...</p>
                </section>

                <aside class="sidebar-log">
                    <h3>DAILY LOG</h3>
                    <div class="log-note">
                        <strong>MAR 28</strong>
                        系统升级：已成功接入 Markdown 自动化解析引擎。
                    </div>
                    <div class="log-note">
                        <strong>MAR 27</strong>
                        罗湖的午后，适合整理这些数字档案。
                    </div>
                    <div class="log-note">
                        <strong>MAR 26</strong>
                        今天喝到了很好喝的埃塞冷萃。
                    </div>
                </aside>
            </div>
        </div>

        <div id="content-view">
            <div class="back-btn" onclick="showIndex()">[ ← BACK TO INDEX ]</div>
            <article id="article-body"></article>
        </div>

        <footer>
            TYPESET BY ABO IN SHENZHEN. <br>
            2026 DIGITAL ARCHIVE PROJECT.
        </footer>
    </div>

    <script>
        // 【管理中心】每写一篇新文章，就把文件名加到这里
        const postFiles = ['first-post.md']; 

        async function loadPosts() {
            const listElement = document.getElementById('post-list');
            listElement.innerHTML = '';

            for (const file of postFiles) {
                try {
                    const response = await fetch(`posts/${file}`);
                    const text = await response.text();
                    
                    // 解析元数据（简单提取 title, date, loc, field）
                    const title = extractMeta(text, 'title') || file;
                    const date = extractMeta(text, 'date') || '2026-XX-XX';
                    const loc = extractMeta(text, 'location') || 'UNKNOWN';
                    const field = extractMeta(text, 'field') || 'GENERAL';

                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-metadata">
                            <span class="meta-item">FIELD: ${field}</span>
                            <span class="meta-item">LOC: ${loc}</span>
                        </div>
                        <h2>${title}</h2>
                        <div class="post-metadata" style="background:none; color:#999;">DATE: ${date}</div>
                    `;
                    card.onclick = () => showPost(text);
                    listElement.appendChild(card);
                } catch (e) {
                    console.error("无法加载文章:", file);
                }
            }
        }

        // 辅助函数：从 Markdown 开头的元数据里抓取信息
        function extractMeta(text, key) {
            const regex = new RegExp(`${key}:\\s*(.*)`);
            const match = text.match(regex);
            return match ? match[1].trim() : null;
        }

        function showPost(markdown) {
            // 过滤掉 --- 之间的元数据，只显示正文
            const content = markdown.split('---').slice(2).join('---');
            document.getElementById('index-view').style.display = 'none';
            document.getElementById('content-view').style.display = 'block';
            document.getElementById('article-body').innerHTML = marked.parse(content);
            window.scrollTo(0, 0);
        }

        function showIndex() {
            document.getElementById('index-view').style.display = 'block';
            document.getElementById('content-view').style.display = 'none';
        }

        loadPosts();
    </script>
</body>
</html>
